<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../../style/global.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Chart JS -->
    
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <!-- <img src="placeholder-logo.svg" alt="MyNutriPlan Logo" height="40"> -->
                <h4 class="mt-3">MyNutriPlan</h4>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="userDashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="userProfile.html">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="userFoodMaterial.html">Food Material</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="userMenu.html">Menu</a>
                    </li>
                </ul>
                <a class="btn btn-primary rounded-pill px-4" href="../index.html">Log Out</a>
                <!-- <button class="btn btn-primary rounded-pill px-4">Login</button> -->
            </div>
        </div>
    </nav>

    <!-- Dashboard Section -->
    <section id="dashboard" class="py-10">
        <div class="container py-5">
            <h2 class="mb-4">Dashboard</h2>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card shadow-sm rounded-4 text-center p-3">
                        <h5>Berat Badan</h5>
                        <p class="fs-4 fw-bold">65 kg</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm rounded-4 text-center p-3">
                        <h5>Tinggi Badan</h5>
                        <p class="fs-4 fw-bold">170 cm</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm rounded-4 text-center p-3">
                        <h5>Usia</h5>
                        <p class="fs-4 fw-bold">25 tahun</p>
                    </div>
                </div>
            </div>
            <div class="row mt-5 back">
                <div class="col-md-6">
                    <h3>Food Material Preview</h3>
                    <table class="table table-bordered rounded-4">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Quantity</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Beras</td>
                                <td>2 kg</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <!-- Chart Section -->
                <div class="col-md-3">
                    <div class="card shadow-sm rounded-4 p-4">
                        <h4 class="mb-4">User Nutrition Consume</h4>
                        <canvas id="userPieChart" style="height: 300px; max-width: 300px;"></canvas>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm rounded-4 p-4">
                        <h4 class="mb-4">User Nutrition Trend</h4>
                        <canvas id="userBarChart" style="height: 300px; max-width: 300px;"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="../../js/script.js"></script>
    <!-- Chart JS (contoh!!!)-->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Pie Chart for User Nutrition Consume
        const userPieCtx = document.getElementById('userPieChart').getContext('2d');
        new Chart(userPieCtx, {
            type: 'pie',
            data: {
                labels: ['Karbohidrat', 'Protein', 'Lemak', 'Vitamin', 'Mineral'],
                datasets: [{
                    label: 'Persentase Konsumsi',
                    data: [55, 20, 15, 5, 5],
                    backgroundColor: [
                        'rgba(255, 206, 86, 0.7)',
                        'rgba(75, 192, 192, 0.7)',
                        'rgba(255, 99, 132, 0.7)',
                        'rgba(153, 102, 255, 0.7)',
                        'rgba(54, 162, 235, 0.7)'
                    ]
                }]
            },
            options: {
                responsive: false,
                plugins: {
                    title: { display: true, text: 'Distribusi Konsumsi Gizi Harian' },
                    legend: { position: 'bottom' }
                },
                maintainAspectRatio: false
            }
        });
        // Bar Chart for User Nutrition Trend
        const userBarCtx = document.getElementById('userBarChart').getContext('2d');
        new Chart(userBarCtx, {
            type: 'bar',
            data: {
                labels: ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu', 'Minggu'],
                datasets: [{
                    label: 'Kalori (kcal)',
                    data: [1800, 1750, 1900, 1850, 2000, 1700, 1950],
                    backgroundColor: 'rgba(54, 162, 235, 0.7)'
                }]
            },
            options: {
                responsive: false,
                plugins: {
                    title: { display: true, text: 'Tren Konsumsi Kalori Mingguan' },
                    legend: { display: false }
                },
                maintainAspectRatio: false
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
