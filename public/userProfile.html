<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../style/global.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Chart JS -->
    
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="placeholder-logo.svg" alt="MyNutriPlan Logo" height="40">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="userDashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="userProfile.html">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="userFoodMaterial.html">Food Material</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="userMenu.html">Menu</a>
                    </li>
                </ul>
                <a class="btn btn-primary rounded-pill px-4" href="index.html">Log Out</a>
                <!-- <button class="btn btn-primary rounded-pill px-4">Login</button> -->
            </div>
        </div>
    </nav>

    <!-- Profile Section -->
    <section id="profile" class="py-5 bg-light">
        <div class="container py-5">
            <h2 class="mb-4">Edit Profile</h2>
            <form>
                <div class="row">
                    <div class="mb-3 col-md-4">
                        <label for="fullname" class="form-label">Full Name</label>
                        <input type="text" class="form-control rounded-pill" id="fullname" name="fullname" placeholder="Enter your full name" required>
                    </div>
                    <div class="mb-3 col-md-4">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control rounded-pill" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="mb-3 col-md-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control rounded-pill" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <div class="mb-3 col-md-4">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" class="form-control rounded-pill" id="age" name="age" min="0" placeholder="Enter your age" required>
                    </div>
                    <div class="mb-3 col-md-4">
                        <label for="gender" class="form-label">Gender</label>
                        <select class="form-control rounded-pill" id="gender" name="gender" required>
                            <option value="" disabled selected>Select your gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div class="mb-3 col-md-4">
                        <label for="medical" class="form-label">Medical History</label>
                        <input type="text" class="form-control rounded-pill" id="medical" name="medical" placeholder="E.g., diabetes, hypertension, none" required>
                    </div>
                    <div class="mb-3 col-md-4">
                        <label for="weight" class="form-label">Weight (kg)</label>
                        <input type="number" class="form-control rounded-pill" id="weight" name="weight" min="0" step="0.1" placeholder="Enter your weight" required>
                    </div>
                    <div class="mb-3 col-md-4">
                        <label for="height" class="form-label">Height (cm)</label>
                        <input type="number" class="form-control rounded-pill" id="height" name="height" min="0" step="0.1" placeholder="Enter your height" required>
                    </div>
                    <div class="mb-3 col-md-4">
                        <label for="activity" class="form-label">Physical Activity</label>
                        <select class="form-control rounded-pill" id="activity" name="activity" required>
                            <option value="" disabled selected>Select your activity level</option>
                            <option value="sedentary">Sedentary (little or no exercise)</option>
                            <option value="light">Lightly active (light exercise/sports 1-3 days/week)</option>
                            <option value="moderate">Moderately active (moderate exercise/sports 3-5 days/week)</option>
                            <option value="active">Very active (hard exercise/sports 6-7 days a week)</option>
                            <option value="extra">Extra active (very hard exercise & physical job)</option>
                        </select>
                    </div>
                </div>
                <a class="btn btn-primary rounded-pill px-4" href="#">Save Changes</a>
            </form>
        </div>
    </section>

    <!-- Chart JS (contoh!!!)-->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const barCtx = document.getElementById('barChart').getContext('2d');
        new Chart(barCtx, {
            type: 'bar',
            data: {
                labels: ['Kalori', 'Protein', 'Karbohidrat', 'Lemak'],
                datasets: [{
                    label: 'Asupan Harian',
                    data: [1800, 60, 250, 70],
                    backgroundColor: [
                        'rgba(75, 192, 192, 0.6)',
                        'rgba(153, 102, 255, 0.6)',
                        'rgba(255, 206, 86, 0.6)',
                        'rgba(255, 99, 132, 0.6)'
                    ]
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: { display: true, text: 'Grafik Bar Asupan Gizi' }
                }
            }
        });

        const pieCtx = document.getElementById('pieChart').getContext('2d');
        new Chart(pieCtx, {
            type: 'pie',
            data: {
                labels: ['Kalori', 'Protein', 'Karbohidrat', 'Lemak'],
                datasets: [{
                    label: 'Persentase Asupan',
                    data: [1800, 60, 250, 70],
                    backgroundColor: [
                        'rgba(75, 192, 192, 0.6)',
                        'rgba(153, 102, 255, 0.6)',
                        'rgba(255, 206, 86, 0.6)',
                        'rgba(255, 99, 132, 0.6)'
                    ]
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: { display: true, text: 'Distribusi Asupan Gizi' }
                }
            }
        });
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
