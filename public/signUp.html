<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign-up</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../style/global.css" rel="stylesheet">
    <link href="../style/sign.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Boxicon -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="bg-light">

    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="card border-0 shadow-sm rounded-4" style="width: 100%; max-width: 800px;">
            <div class="card-body p-4">
                <a href="index.html" class="btn btn-light rounded-pill px-3 mb-3 d-inline-flex align-items-center" style="position: absolute; left: 1.5rem; top: 1.5rem;">
                    <i class='bx bx-arrow-back' style="font-size: 1.2rem;"></i>
                    <span class="ms-2 d-none d-md-inline">Back</span>
                </a>                
                <h2 class="mb-4 text-center">Sign up</h2>
                <form>
                    <div class="row">
                        <div class="mb-3 col-md-4">
                            <label for="fullname" class="form-label">Full Name</label>
                            <input type="text" class="form-control rounded-pill" id="fullname" name="fullname" placeholder="Enter your full name" required>
                        </div>
                        <div class="mb-3 col-md-4">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control rounded-pill" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3 col-md-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control rounded-pill" id="password" name="password" placeholder="Enter your password" required>
                        </div>
                        <div class="mb-3 col-md-4">
                            <label for="age" class="form-label">Age</label>
                            <input type="number" class="form-control rounded-pill" id="age" name="age" min="0" placeholder="Enter your age" required>
                        </div>
                        <div class="mb-3 col-md-4">
                            <label for="gender" class="form-label">Gender</label>
                            <select class="form-control rounded-pill" id="gender" name="gender" required>
                                <option value="" disabled selected>Select your gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>
                        <div class="mb-3 col-md-4">
                            <label for="medical" class="form-label">Medical History</label>
                            <input type="text" class="form-control rounded-pill" id="medical" name="medical" placeholder="E.g., diabetes, hypertension, none" required>
                        </div>
                        <div class="mb-3 col-md-4">
                            <label for="weight" class="form-label">Weight (kg)</label>
                            <input type="number" class="form-control rounded-pill" id="weight" name="weight" min="0" step="0.1" placeholder="Enter your weight" required>
                        </div>
                        <div class="mb-3 col-md-4">
                            <label for="height" class="form-label">Height (cm)</label>
                            <input type="number" class="form-control rounded-pill" id="height" name="height" min="0" step="0.1" placeholder="Enter your height" required>
                        </div>
                        <div class="mb-3 col-md-4">
                            <label for="activity" class="form-label">Physical Activity</label>
                            <select class="form-control rounded-pill" id="activity" name="activity" required>
                                <option value="" disabled selected>Select your activity level</option>
                                <option value="sedentary">Sedentary (little or no exercise)</option>
                                <option value="light">Lightly active (light exercise/sports 1-3 days/week)</option>
                                <option value="moderate">Moderately active (moderate exercise/sports 3-5 days/week)</option>
                                <option value="active">Very active (hard exercise/sports 6-7 days a week)</option>
                                <option value="extra">Extra active (very hard exercise & physical job)</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <p>Already have an account? Please <a href="signIn.html">sign in</a></p>
                    </div>
                    <a class="btn btn-primary rounded-pill px-4 position-absolute" href="#" style="right: 1.5rem; bottom: 1.5rem;">Sign Up</a>
                </form>
            </div>
        </div>
    </div>


    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../js/script.js"></script>
</body>
</html>
