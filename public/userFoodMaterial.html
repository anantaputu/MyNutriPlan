<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../style/global.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Data Tables Ref -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.2.2/css/dataTables.dataTables.css" />

    
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="placeholder-logo.svg" alt="MyNutriPlan Logo" height="40">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="userDashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="userProfile.html">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="userFoodMaterial.html">Food Material</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="userMenu.html">Menu</a>
                    </li>
                </ul>
                <a class="btn btn-primary rounded-pill px-4" href="index.html">Log Out</a>
                <!-- <button class="btn btn-primary rounded-pill px-4">Login</button> -->
            </div>
        </div>
    </nav>

    <!-- Foods Material Section -->
    <section id="foods" class="py-5">
        <div class="container py-5">
            <h2 class="mb-4">Foods Material</h2>
            <!-- If no food data -->
            <p class="text-muted">Belum ada bahan makanan.</p>

            <!-- If food data exists -->
            <table class="table table-bordered rounded-4 overflow-hidden"  id="myTable">
                <thead class="table-light">
                    <tr>
                        <th>Name</th>
                        <th>Quantity</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Beras</td>
                        <td>2 kg</td>
                        <td>
                            <button class="btn btn-sm btn-warning rounded-pill">Edit</button>
                            <button class="btn btn-sm btn-danger rounded-pill">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
            <button class="btn btn-success rounded-pill mt-3">Tambah Bahan Makanan</button>
        </div>
    </section>

    <!-- Chart JS (contoh!!!)-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/2.2.2/js/dataTables.js"></script>
    <script>
        $(document).ready( function () {
            $('#myTable').DataTable();
        } );
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
