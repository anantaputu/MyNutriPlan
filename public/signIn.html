<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../style/global.css" rel="stylesheet">
    <link href="../style/sign.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Boxicon -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="bg-light">

    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="card border-0 shadow-sm rounded-4" style="width: 100%; max-width: 500px;">
            <div class="card-body p-4">
                <a href="index.html" class="btn btn-light rounded-pill px-3 mb-3 d-inline-flex align-items-center" style="position: absolute; left: 1.5rem; top: 1.5rem;">
                    <i class='bx bx-arrow-back' style="font-size: 1.2rem;"></i>
                    <span class="ms-2 d-none d-md-inline">Back</span>
                </a>
                <h2 class="mb-4 text-center">Sign in</h3>
                <form>
                    <div class="mb-3">
                        <label for="name" class="form-label">Username</label>
                        <input type="text" class="form-control rounded-pill" id="name" placeholder="Enter your username">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control rounded-pill" id="email" placeholder="Enter your email">
                    </div>
                    <div class="mb-3">
                        <p>Don't have an account? Please <a href="signUp.html">sign up</a></p>
                    </div>
                    <a class="btn btn-primary rounded-pill px-4 position-absolute" href="userDashboard.html" style="right: 1.5rem; bottom: 1.5rem;">Sign In</a>
                    <!-- <button class="btn btn-primary rounded-pill px-4">Login</button> -->
                </form>
            </div>
        </div>
    </div>


    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../js/script.js"></script>
</body>
</html>
