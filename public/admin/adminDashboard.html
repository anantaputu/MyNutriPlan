<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../../style/global.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/2.2.2/css/jquery.dataTables.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand" href="adminDashboard.html">
                <h4 class="mt-3">MyNutriPlan Admin</h4>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="adminDashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="adminUserManagement.html">User Management</a>
                    </li>                    
                    <li class="nav-item">
                        <a class="nav-link" href="adminFoodMaterialSystemManagement.html">Food Material Management</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="adminMenuSystemManagement.html">Menu Management</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="adminArticleManagement.html">Article Management</a>
                    </li>
                </ul>
                <a class="btn btn-primary rounded-pill px-4" href="../index.html">Log Out</a>
            </div>
        </div>
    </nav>

    <!-- Dashboard Section -->
    <section id="dashboard" class="py-10">
        <div class="container py-5">
            <h2 class="mb-4">Admin Dashboard</h2>
            <div class="row g-4 mb-2">
                <div class="col-md-4">
                    <div class="card shadow-sm rounded-4 text-center p-3">
                        <h5>Total Users</h5>
                        <p class="fs-4 fw-bold">120</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm rounded-4 text-center p-3">
                        <h5>Total Food Materials</h5>
                        <p class="fs-4 fw-bold">50</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm rounded-4 text-center p-3">
                        <h5>Active Menus</h5>
                        <p class="fs-4 fw-bold">10</p>
                    </div>
                </div>
            </div>
            <div class="row g-4 mb-5">
                <div class="col-md-4">
                    <div class="card shadow-sm rounded-4 text-center p-3">
                        <h5>Pending Users</h5>
                        <p class="fs-4 fw-bold">5</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm rounded-4 text-center p-3">
                        <h5>Inactive Users</h5>
                        <p class="fs-4 fw-bold">8</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm rounded-4 text-center p-3">
                        <h5>Reports</h5>
                        <p class="fs-4 fw-bold">3</p>
                    </div>
                </div>
            </div>
            <!-- Chart Section -->
            <div class="row mb-5">
                <div class="col-12">
                    <div class="card shadow-sm rounded-4 p-4">
                        <h4 class="mb-4">User Growth Overview</h4>
                        <div id="adminApexChart" style="height: 350px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="../../js/script.js"></script>
    <!-- jQuery and DataTables JS -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/2.2.2/js/jquery.dataTables.min.js"></script>
    <script>
        $(document).ready( function () {
            $('#adminUserTable').DataTable();
        });
    </script>
    <!-- Apex Chart -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script>
        // Example ApexCharts: User Growth Overview
        var options = {
            chart: {
                type: 'line',
                height: 350,
                toolbar: { show: false }
            },
            series: [{
                name: 'Total Users',
                data: [80, 90, 100, 110, 120, 130, 140]
            }, {
                name: 'Active Users',
                data: [60, 70, 80, 90, 100, 110, 120]
            }],
            xaxis: {
                categories: ['Nov', 'Dec', 'Jan', 'Feb', 'Mar', 'Apr', 'May']
            },
            colors: ['#0d6efd', '#198754'],
            dataLabels: { enabled: false },
            stroke: { curve: 'smooth', width: 3 },
            legend: { position: 'top' },
            grid: { borderColor: '#eee' }
        };
        var chart = new ApexCharts(document.querySelector("#adminApexChart"), options);
        chart.render();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
