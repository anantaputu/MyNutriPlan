<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../style/global.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Chart JS -->
    
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="placeholder-logo.svg" alt="MyNutriPlan Logo" height="40">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="userDashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="userProfile.html">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="userFoodMaterial.html">Food Material</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="userMenu.html">Menu</a>
                    </li>
                </ul>
                <a class="btn btn-primary rounded-pill px-4" href="index.html">Log Out</a>
                <!-- <button class="btn btn-primary rounded-pill px-4">Login</button> -->
            </div>
        </div>
    </nav>

    <!-- Generate Menu Section -->
    <section id="menu" class="py-5 bg-light">
        <div class="container py-5">
            <div class="text-center mb-5">
                <h2 class="display-5 fw-bold">Generated Menu</h2>
                <p class="lead">Menu based on your food material</p>
            </div>
            <div class="row g-4">
                <!-- Menu Card 1 -->
                <div class="col-lg-4 col-md-6">
                    <div class="card border-0 shadow-sm h-100 rounded-4 overflow-hidden">
                        <img src="placeholder-article1.svg" class="card-img-top" alt="Menu Image">
                        <div class="card-body p-4">
                            <h3 class="h5 mb-2">Nasi Goreng Sehat</h3>
                            <p class="small text-muted mb-2">Chef A</p>
                            <p class="card-text">Menu olahan nasi dengan sayur dan rempah sehat, cocok untuk sarapan.</p>
                        </div>
                        <div class="card-footer bg-white border-0 p-4 pt-0">
                            <a href="#" class="btn btn-sm btn-outline-primary rounded-pill">Lihat Resep</a>
                        </div>
                    </div>
                </div>
                <!-- Tambahan card bisa ditiru dari atas -->
            </div>
        </div>
    </section>

    <!-- Chart JS (contoh!!!)-->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const barCtx = document.getElementById('barChart').getContext('2d');
        new Chart(barCtx, {
            type: 'bar',
            data: {
                labels: ['Kalori', 'Protein', 'Karbohidrat', 'Lemak'],
                datasets: [{
                    label: 'Asupan Harian',
                    data: [1800, 60, 250, 70],
                    backgroundColor: [
                        'rgba(75, 192, 192, 0.6)',
                        'rgba(153, 102, 255, 0.6)',
                        'rgba(255, 206, 86, 0.6)',
                        'rgba(255, 99, 132, 0.6)'
                    ]
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: { display: true, text: 'Grafik Bar Asupan Gizi' }
                }
            }
        });

        const pieCtx = document.getElementById('pieChart').getContext('2d');
        new Chart(pieCtx, {
            type: 'pie',
            data: {
                labels: ['Kalori', 'Protein', 'Karbohidrat', 'Lemak'],
                datasets: [{
                    label: 'Persentase Asupan',
                    data: [1800, 60, 250, 70],
                    backgroundColor: [
                        'rgba(75, 192, 192, 0.6)',
                        'rgba(153, 102, 255, 0.6)',
                        'rgba(255, 206, 86, 0.6)',
                        'rgba(255, 99, 132, 0.6)'
                    ]
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: { display: true, text: 'Distribusi Asupan Gizi' }
                }
            }
        });
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
